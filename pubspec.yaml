name: prizo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  http: ^1.2.2
  html: ^0.15.0
  json_annotation: ^4.7.0
  diacritic: ^0.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  mobile_scanner: ^6.0.2
  location: ^6.0.2
  map_launcher: ^3.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_dia.png
    - assets/images/logo_consum.png
    - assets/images/logo_carrefour.png
    - assets/fonts/
    - assets/icons/cesta_icono.png
    - assets/icons/corazon_icono.png
    - assets/icons/corazonnegro_icono.png

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
